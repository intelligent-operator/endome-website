name = "endome-website"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (HTML, CSS, images) served straight from /public.
# The Worker runs only when an asset isn't found (e.g. /api/*).
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"
# Worker runs before assets so the auth gate fires for /dashboard, /story,
# /tests, /pet, /onboarding *before* the HTML is ever served. With the
# default (false) the assets binding short-circuits the worker for any URL
# that maps to a file, which caused the brief flash of protected pages.
run_worker_first = true

# Public, non-secret config. Override per-environment as needed.
[vars]
SITE_URL = "https://endome.com"
NEWSLETTER_FROM_EMAIL = "contact@endome.com"
NEWSLETTER_FROM_NAME = "EndoMe"
NOTIFY_EMAIL = "contact@endome.com"
STRIPE_DNA_PRICE_ID = "price_replace_me"

# ----------------------------------------------------------------------
# Secrets (set via the Cloudflare dashboard or `wrangler secret put`).
# Do NOT put real values in this file.
#
#   STRIPE_SECRET_KEY      sk_live_...   (or sk_test_... in preview)
#   STRIPE_WEBHOOK_SECRET  whsec_...     (Stripe -> Webhooks)
#   STRIPE_PRICE_DNA       price_...     (Stripe Price ID for EndoMe DNA)
#   STRIPE_PRICE_BLOODS    price_...     (Stripe Price ID for EndoMe Bloods)
#   STRIPE_PRICE_MAP       price_...     (Stripe Price ID for EndoMe Map)
#
#   MANDRILL_API_KEY       md-...        (Mailchimp Transactional)
#
#   AUTH_USERNAME          dashboard login username
#   AUTH_PASSWORD          dashboard login password
#   SESSION_SECRET         random 32+ byte string, signs session cookies
#                          (generate: `openssl rand -base64 48`)
# ----------------------------------------------------------------------

# Custom domain routing. Add the zone in the Cloudflare dashboard first.
# [[routes]]
# pattern = "endome.app/*"
# zone_name = "endome.app"
# custom_domain = true

[observability]
enabled = true

# Cron triggers — fire `scheduled()` in src/worker.js on this schedule.
# "0 7 1 * *" = 07:00 UTC on the 1st of every month. That's a soft, off-peak
# window for the EndoMe insight engine to refresh every user's monthly summary
# (~5pm AEST / 6pm AEDT — done well before anyone opens the app for the day).
[triggers]
crons = ["0 7 1 * *"]

# ----------------------------------------------------------------------
# D1 — relational storage for users, daily logs, symptoms, pets, notifs.
# One-time setup:
#   Cloudflare dashboard → Storage & databases → D1 → Create database
#   name it "endome-db", copy the Database ID, paste below.
# Or via CLI: wrangler d1 create endome-db
# Then apply migrations (see README "Storage" section).
# ----------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "endome-db"
database_id = "3b48e54c-f38a-4b97-b0e5-1d31be6d979b"
migrations_dir = "migrations"

# ----------------------------------------------------------------------
# R2 — private object storage for user-uploaded documents (ultrasound
# images, lab reports, doctor's letters, etc).
#
# One-time setup:
#   Cloudflare dashboard → R2 → Create bucket → name it "endome-docs".
#   (Or CLI: `wrangler r2 bucket create endome-docs`.)
# Files are scoped under "users/<user_id>/..." in the bucket so they
# cannot be cross-read by other accounts even if the binding were
# misconfigured for public access.
# ----------------------------------------------------------------------
[[r2_buckets]]
binding = "DOCS"
bucket_name = "endome-docs"

# Preview / staging environment used by CI on non-main branches.
[env.preview]
name = "endome-website-preview"
vars = { SITE_URL = "https://preview.endome.app" }
