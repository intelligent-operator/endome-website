# Optional GitHub Actions deploy. The Cloudflare Workers GitHub integration
# (configured in the CF dashboard) handles deploys automatically, so you only
# need this workflow if you'd rather drive deploys from GitHub Actions.
#
# To enable: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as repo secrets
# and remove the `if: false` guard below.

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
