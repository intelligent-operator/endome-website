<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – EndoMe</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/logo-final.png" />
  <meta name="theme-color" content="#ff4e8a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true"></div>

  <main class="login-wrap">
    <div class="login-card">
      <a href="/" class="login-logo" aria-label="EndoMe home">
        <img src="/logo-final.png" alt="" width="72" height="72" />
      </a>
      <h1>Welcome back</h1>
      <p class="login-sub">Sign in to access your EndoMe dashboard.</p>

      <form id="login-page-form" method="post" action="/api/login" novalidate autocomplete="off">
        <label class="field">
          <span>Email or username</span>
          <input
            type="text" name="username" autocomplete="username"
            required maxlength="100"
            spellcheck="false" autocapitalize="none" autocorrect="off"
            inputmode="text" />
        </label>
        <label class="field">
          <span>Password</span>
          <input
            type="password" name="password" autocomplete="current-password"
            required minlength="8" maxlength="500"
            spellcheck="false" />
        </label>
        <button type="submit" class="btn btn-primary full" id="login-submit">Sign In</button>
        <p id="login-page-status" class="form-status" role="status" aria-live="polite"></p>
      </form>

      <p class="login-foot">New here? <a href="/register">Create an account</a> · <a href="/">Back to home</a></p>
    </div>
  </main>

  <script src="/login.js" defer></script>
</body>
</html>
