<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – EndoMe</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/logo-final.png" />
  <meta name="theme-color" content="#ff4e8a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=1780054696" />
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true"></div>

  <main class="login-wrap">
    <div class="login-card">
      <a href="/" class="login-logo" aria-label="EndoMe home">
        <img src="/logo-final.png" alt="" width="72" height="72" />
      </a>

      <!-- STEP 1: credentials -->
      <section data-step="creds">
        <h1 id="creds-title">Welcome back</h1>
        <p class="login-sub" id="creds-sub">Sign in with your password — we'll email you a code to confirm.</p>

        <form id="creds-form" novalidate autocomplete="off">
          <div class="field">
            <label for="login-user">Email or username</label>
            <input
              id="login-user" type="text" name="username" required maxlength="200"
              autocomplete="username" spellcheck="false" autocapitalize="none" autocorrect="off"
              inputmode="email" placeholder="you@example.com" />
          </div>
          <div class="field" id="password-field">
            <label for="login-pw">Password</label>
            <input
              id="login-pw" type="password" name="password" minlength="8" maxlength="500"
              autocomplete="current-password" spellcheck="false" placeholder="••••••••" />
          </div>
          <button type="submit" class="btn btn-primary full" id="creds-submit">Continue</button>
          <p class="form-status" id="creds-status" role="status" aria-live="polite"></p>
        </form>

        <p class="login-foot">
          <a href="#" id="toggle-mode">Email me a sign-in code instead</a>
        </p>
        <p class="login-foot">New here? <a href="/register">Create an account</a></p>
      </section>

      <!-- STEP 2: OTP -->
      <section data-step="otp" hidden>
        <h1>Check your email</h1>
        <p class="login-sub">
          We sent a 6-digit code to <strong id="otp-target">your inbox</strong>.<br/>
          It expires in 10 minutes.
        </p>

        <form id="otp-form" novalidate autocomplete="off">
          <div class="field otp-field">
            <label for="otp-code">Sign-in code</label>
            <input
              id="otp-code" type="text" name="code" required
              inputmode="numeric" autocomplete="one-time-code"
              pattern="\d{6}" maxlength="6"
              placeholder="000000" />
          </div>
          <button type="submit" class="btn btn-primary full" id="otp-submit">Verify code</button>
          <p class="form-status" id="otp-status" role="status" aria-live="polite"></p>
        </form>

        <p class="login-foot">
          <a href="#" id="otp-resend">Resend code</a> ·
          <a href="#" id="back-to-creds">Use a different account</a>
        </p>
      </section>
    </div>
  </main>

  <script src="/login.js?v=1780112495" defer></script>
</body>
</html>
