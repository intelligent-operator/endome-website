<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create your account – EndoMe</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/logo-final.png" />
  <meta name="theme-color" content="#ff4e8a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=1780146586" />
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true"></div>

  <main class="login-wrap">
    <div class="login-card">
      <a href="/" class="login-logo" aria-label="EndoMe home">
        <img src="/logo-final.png" alt="" width="72" height="72" />
      </a>
      <h1>Create your account</h1>
      <p class="login-sub">Start tracking your story today.</p>

      <form id="register-form" novalidate autocomplete="off">
        <div class="field">
          <label for="reg-name">Your name</label>
          <input
            id="reg-name" type="text" name="displayName"
            autocomplete="given-name" required maxlength="60"
            placeholder="Alex" spellcheck="false" />
        </div>
        <div class="field">
          <label for="reg-alias">@handle <span class="field-opt">(optional)</span></label>
          <input
            id="reg-alias" type="text" name="alias"
            autocomplete="off" maxlength="30"
            placeholder="BethEndoMe"
            spellcheck="false" autocapitalize="none" autocorrect="off"
            pattern="[A-Za-z0-9_.-]+" />
          <p class="field-hint">Letters, numbers, underscore, hyphen, dot. This is how friends find you in Messages — your email stays private. You can set it later in Profile.</p>
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input
            id="reg-email" type="email" name="email"
            autocomplete="email" required maxlength="200"
            placeholder="you@example.com"
            spellcheck="false" autocapitalize="none" autocorrect="off"
            inputmode="email" />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input
            id="reg-password" type="password" name="password"
            autocomplete="new-password" required minlength="10" maxlength="500"
            placeholder="At least 10 characters" />
          <p class="field-hint" id="pw-strength">Use a long passphrase you don't reuse elsewhere.</p>
        </div>

        <button type="submit" class="btn btn-primary full" id="register-submit">Create account</button>
        <p id="register-status" class="form-status" role="status" aria-live="polite"></p>
      </form>

      <p class="login-foot">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </main>

  <script src="/register.js?v=1779934116" defer></script>
</body>
</html>
