<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>Profile – EndoMe</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#ff4e8a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/dashboard.css?v=4" />
  <link rel="stylesheet" href="/profile.css?v=1" />
  <link rel="stylesheet" href="/account-menu.css?v=1" />
</head>
<body class="dash-body">
  <div id="page-loader" class="page-loader">
    <div class="page-loader-content">
      <img src="/logo-final.png" alt="EndoMe" class="page-loader-logo" />
      <div class="page-loader-bar"></div>
      <p class="page-loader-text">Loading profile…</p>
    </div>
  </div>

  <header class="dash-topbar">
    <div class="dash-topbar-inner">
      <a href="/" class="logo">
        <img src="/logo-final.png" alt="" class="logo-mark" width="32" height="32" />
        <span class="logo-text">EndoMe</span>
      </a>
      <div class="dash-spacer"></div>
      <div class="dash-user">
        <div class="account-menu">
        <button class="account-toggle" id="account-toggle" type="button" aria-haspopup="true" aria-expanded="false">
          <div class="avatar"><svg viewBox="0 0 40 40" width="36" height="36"><circle cx="20" cy="20" r="20" fill="#ffd6e0"/><circle cx="20" cy="16" r="7" fill="#8a4a2a"/><path d="M6 36c2-8 8-12 14-12s12 4 14 12" fill="#f5c69b"/><circle cx="20" cy="16" r="6" fill="#f5c69b"/></svg></div>
          <span class="profile-name">Hi, <span data-bind="displayName">there</span></span>
          <svg class="account-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M6 9l6 6 6-6" stroke="#3a2330" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="account-dropdown" id="account-dropdown" hidden role="menu">
          <a href="/profile" role="menuitem"><span class="acm-ico">👤</span> Profile</a>
          <a href="/security" role="menuitem"><span class="acm-ico">🔒</span> Security &amp; password</a>
          <a href="/documents" role="menuitem"><span class="acm-ico">📁</span> My documents</a>
          <a href="/meds" role="menuitem"><span class="acm-ico">💊</span> My medications</a>
          <div class="account-divider"></div>
          <a href="/api/logout" role="menuitem"><span class="acm-ico">↪</span> Sign out</a>
        </div>
      </div>
      </div>
    </div>
  </header>

  <div class="dash-layout community-layout">
    <aside class="dash-sidebar">
      <nav class="side-nav">
        <a href="/dashboard"><span class="ico">🏠</span> Overview</a>
        <a href="/story"><span class="ico">📖</span> Your Story</a>
        <a href="/tests"><span class="ico">🧪</span> Tests</a>
        <a href="/meds"><span class="ico">💊</span> Medications</a>
        <a href="/documents"><span class="ico">📁</span> Documents</a>
        <a href="/pet"><span class="ico">🐾</span> EndoPet</a>
        <a class="active" href="/community"><span class="ico">💬</span> Community</a>
        <a href="/profile"><span class="ico">👤</span> Profile</a>
      </nav>
    </aside>

    <main class="dash-main community-main">
      <a href="javascript:history.length>1?history.back():location.assign('/community')" class="back-link">← Back</a>
      <div id="profile-body">
        <p class="empty-state">Loading…</p>
      </div>
    </main>
  </div>

  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
  <script src="/account-menu.js?v=1" defer></script>
  <script src="/u.js?v=1" defer></script>
</body>
</html>
