<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Story – EndoMe</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/logo-final.png" />
  <meta name="theme-color" content="#ff4e8a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/dashboard.css" />
  <link rel="stylesheet" href="/story.css" />
</head>
<body class="dash-body">
  <header class="dash-topbar">
    <div class="dash-topbar-inner">
      <a href="/" class="logo">
        <img src="/logo-final.png" alt="" class="logo-mark" width="32" height="32" />
        <span class="logo-text">EndoMe</span>
      </a>
      <div class="dash-spacer"></div>
      <div class="dash-user">
        <button class="bell" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M6 19h12l-1.5-2V11a4.5 4.5 0 10-9 0v6L6 19z" stroke="#3a2330" stroke-width="2" stroke-linejoin="round"/><path d="M10 22h4" stroke="#3a2330" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="profile">
          <div class="avatar">
            <svg viewBox="0 0 40 40" width="36" height="36"><circle cx="20" cy="20" r="20" fill="#ffd6e0"/><circle cx="20" cy="16" r="7" fill="#8a4a2a"/><path d="M6 36c2-8 8-12 14-12s12 4 14 12" fill="#f5c69b"/><circle cx="20" cy="16" r="6" fill="#f5c69b"/></svg>
          </div>
          <span class="profile-name">Hi, <span data-bind="displayName">there</span></span>
        </div>
        <a href="/api/logout" class="signout" title="Sign out" aria-label="Sign out">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" stroke="#7a5f6c" stroke-width="2" stroke-linecap="round"/><path d="M10 17l5-5-5-5M15 12H3" stroke="#7a5f6c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
  </header>

  <div class="dash-layout story-layout">
    <aside class="dash-sidebar">
      <nav class="side-nav">
        <a href="/dashboard"><span class="ico">🏠</span> Overview</a>
        <a class="active" href="/story"><span class="ico">📖</span> Your Story</a>
      </nav>
    </aside>

    <main class="dash-main story-main">
      <header class="story-header">
        <div class="story-hero">
          <h1>Your Story</h1>
          <p class="story-lead">A guided path through endometriosis — from first symptoms to a treatment plan. We mark off what we can; you mark off the rest. Take it at your pace.</p>
        </div>
        <div class="story-ring-wrap">
          <svg viewBox="0 0 120 120" width="120" height="120" class="story-ring" aria-hidden="true">
            <circle cx="60" cy="60" r="52" fill="none" stroke="#ffd6e0" stroke-width="12"/>
            <circle id="ring-progress" cx="60" cy="60" r="52" fill="none" stroke="url(#ringGrad)" stroke-width="12"
              stroke-dasharray="326.7" stroke-dashoffset="326.7" stroke-linecap="round"
              transform="rotate(-90 60 60)" style="transition:stroke-dashoffset .6s ease"/>
            <defs>
              <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#ff4e8a"/>
                <stop offset="100%" stop-color="#ffb380"/>
              </linearGradient>
            </defs>
            <text id="ring-percent" x="60" y="58" text-anchor="middle" font-size="24" font-weight="700" fill="#ff4e8a" font-family="Poppins,sans-serif">0%</text>
            <text id="ring-fraction" x="60" y="78" text-anchor="middle" font-size="11" fill="#7a5f6c" font-family="Poppins,sans-serif">0 of 12</text>
          </svg>
        </div>
      </header>

      <div id="story-phases">
        <p class="empty-state">Loading your story…</p>
      </div>
    </main>
  </div>

  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>

  <script src="/story.js" defer></script>
</body>
</html>
